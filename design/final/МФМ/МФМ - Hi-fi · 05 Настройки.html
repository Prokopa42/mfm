<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>МФМ · Hi-fi · Настройки</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Archivo+Black&display=swap" rel="stylesheet">

<style>
  :root{
    --ink:#14120d; --ink-80:#2a2720; --ink-55:#6a6557; --ink-35:#9a9483; --ink-18:#c4bfac;
    --hair:#d9d3bc; --thin:#e3ddc5; --paper:#f4f1e8;
    --red:#c42a2a; --blue:#0e4fb0; --yellow:#eccc3a;
    --w-hair:0.5px; --w-reg:1px; --w-heavy:1.5px;
    --t-hero:64px; --t-hero-x:20px; --t-num-m:14px; --t-num-s:12px;
    --t-eyebrow:9px; --t-body:11.5px; --t-micro:9.5px;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{
    background:#e8e3d0; color:var(--ink);
    font-family:'JetBrains Mono', ui-monospace, monospace;
    -webkit-font-smoothing:antialiased;
    font-feature-settings: "tnum" 1; font-variant-numeric: tabular-nums;
  }
  .slab{ font-family:'Archivo Black', system-ui; font-weight:900; letter-spacing:-0.02em; }
  .mono{ font-family:'JetBrains Mono', monospace; }
  .tnum{ font-variant-numeric: tabular-nums; }
  .eyebrow{
    font-family:'Archivo Black', system-ui;
    font-size: var(--t-eyebrow); letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--ink-55);
  }
  .eyebrow--ink{ color: var(--ink); }
  #root{ padding: 48px 32px 72px; max-width: 1440px; margin: 0 auto; }
</style>
</head>

<template id="__bundler_thumbnail" data-bg-color="#f4f1e8">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <rect x="420" y="120" width="360" height="560" fill="#f4f1e8" stroke="#14120d" stroke-width="4"/>
    <rect x="460" y="220" width="280" height="24" fill="none" stroke="#14120d" stroke-width="1"/>
    <rect x="656" y="226" width="78" height="12" fill="#14120d"/>
    <rect x="460" y="620" width="140" height="40" fill="#14120d"/>
    <text x="530" y="644" font-family="'Archivo Black', sans-serif" font-size="14" text-anchor="middle" fill="#f4f1e8">ПРИМЕНИТЬ</text>
    <text x="600" y="720" font-family="'Archivo Black', sans-serif" font-size="22" text-anchor="middle" fill="#14120d">05 · НАСТРОЙКИ</text>
  </svg>
</template>

<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="hifi-primitives.jsx"></script>
<script type="text/babel" src="hifi-settings.jsx"></script>

<script type="text/babel">

function PageHead() {
  return (
    <header style={{ marginBottom: 40, display: 'grid', gridTemplateColumns: '1fr auto', alignItems: 'end', gap: 40, borderBottom: '1px solid var(--ink)', paddingBottom: 22 }}>
      <div>
        <div style={{ display: 'flex', alignItems: 'baseline', gap: 14, marginBottom: 8 }}>
          <span className="slab" style={{ fontSize: 11, letterSpacing: '0.2em', textTransform: 'uppercase' }}>МФМ</span>
          <div style={{ width: 28, height: 0.5, background: 'var(--ink-55)' }} />
          <span className="mono" style={{ fontSize: 10, color: 'var(--ink-55)', letterSpacing: '0.1em', textTransform: 'uppercase' }}>Hi-fi · 05 · Настройки</span>
        </div>
        <h1 className="slab" style={{ fontSize: 40, lineHeight: 1.02, letterSpacing: '-0.015em', maxWidth: 820 }}>
          Черновик → Применить. Staged editing.
        </h1>
        <p className="mono" style={{ fontSize: 12, color: 'var(--ink-55)', marginTop: 14, maxWidth: 720, lineHeight: 1.55 }}>
          Настройки меняют не отдельное значение, а всю математику приложения. Поэтому правки копятся в черновик, а пересчёт происходит одним шагом по явной кнопке «Применить». 4 группы: Цикл зарплаты · Подушка · Накопления · Расчёт.
        </p>
      </div>
      <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-end', gap: 10 }}>
        <div style={{ display: 'flex', gap: 4 }}>
          {['01', '02', '03', '04', '05'].map((n, i) => (
            <div key={i} style={{
              padding: '5px 9px',
              border: i === 4 ? '1px solid var(--ink)' : '0.5px solid var(--ink-35)',
              background: i === 4 ? 'var(--ink)' : 'transparent',
              color:      i === 4 ? 'var(--paper)' : 'var(--ink-55)',
            }}>
              <span className="slab" style={{ fontSize: 9, letterSpacing: '0.14em' }}>{n}</span>
            </div>
          ))}
        </div>
        <span className="mono" style={{ fontSize: 9.5, color: 'var(--ink-55)', letterSpacing: '0.08em' }}>СЕЙЧАС · ЦИКЛ · НАКОП. · ИСТОРИЯ · НАСТРОЙКИ</span>
      </div>
    </header>
  );
}

function Callout({ n, title, items }) {
  return (
    <div style={{ maxWidth: 340 }}>
      <div style={{ display: 'flex', alignItems: 'baseline', gap: 8, marginBottom: 8 }}>
        <span className="slab" style={{ fontSize: 11, letterSpacing: '0.14em' }}>{n}</span>
        <div style={{ flex: 1, height: 0.5, background: 'var(--ink)' }} />
      </div>
      <div className="slab" style={{ fontSize: 16, lineHeight: 1.25, marginBottom: 14, letterSpacing: '-0.01em' }}>{title}</div>
      <div style={{ display: 'grid', gridTemplateColumns: 'auto 1fr', columnGap: 12, rowGap: 8 }}>
        {items.map(([k, v], i) => (
          <React.Fragment key={i}>
            <span className="eyebrow" style={{ paddingTop: 2, fontSize: 8.5 }}>{k}</span>
            <span className="mono" style={{ fontSize: 10.5, lineHeight: 1.5, color: 'var(--ink-80)' }}>{v}</span>
          </React.Fragment>
        ))}
      </div>
    </div>
  );
}

function PhoneCaption({ n, label, sublabel, accent }) {
  return (
    <div style={{ textAlign: 'center', marginTop: 20, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6 }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
        <span className="slab" style={{ fontSize: 10, letterSpacing: '0.18em' }}>{n}</span>
        <div style={{ width: 12, height: 1, background: 'var(--ink)' }} />
        <span className="slab" style={{ fontSize: 14, letterSpacing: '0.1em', textTransform: 'uppercase' }}>{label}</span>
        {accent && <div style={{ width: 8, height: 8, background: accent }} />}
      </div>
      <span className="mono" style={{ fontSize: 10, color: 'var(--ink-55)', letterSpacing: '0.02em' }}>{sublabel}</span>
    </div>
  );
}

function App() {
  return (
    <>
      <PageHead />

      <section style={{ marginBottom: 40, padding: '18px 20px', border: '0.5px solid var(--ink)', display: 'grid', gridTemplateColumns: 'auto 1fr', gap: 24 }}>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 6, minWidth: 220 }}>
          <span className="eyebrow eyebrow--ink">Принцип</span>
          <span className="slab" style={{ fontSize: 16, lineHeight: 1.2 }}>Staged editing</span>
          <span className="mono" style={{ fontSize: 10, color: 'var(--ink-55)', marginTop: 4 }}>почему, а не как</span>
          <span className="mono tnum" style={{ fontSize: 11 }}>draft → apply ≠ live</span>
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 18 }}>
          {[
            ['DRAFT',   'Каждая правка меняет черновик. Цифры в приложении остаются прежними.'],
            ['APPLY',   'Кнопка «Применить» пересчитывает всю модель одним шагом. Один атомарный акт.'],
            ['SAFETY',  '«Отменить» возвращает черновик к последнему применённому состоянию.'],
          ].map(([k, v]) => (
            <div key={k}>
              <div className="eyebrow" style={{ fontSize: 8.5, marginBottom: 4 }}>{k}</div>
              <div className="mono" style={{ fontSize: 10.5, lineHeight: 1.5, color: 'var(--ink-80)' }}>{v}</div>
            </div>
          ))}
        </div>
      </section>

      <section style={{ display: 'grid', gridTemplateColumns: 'minmax(280px, 340px) auto minmax(280px, 340px)', gap: 56, alignItems: 'start', justifyContent: 'center' }}>
        <div style={{ paddingTop: 24, display: 'flex', flexDirection: 'column', gap: 28 }}>
          <Callout n="01" title="Индикация состояния"
            items={[
              ['HEADER', '«черновик · N правок» в шапке — сразу виден статус'],
              ['DOT',    'Красная точка + «не применено» справа · ink-35 «синхронизировано» без правок'],
              ['BANNER', 'Outline-блок с глифом: «Правки вносятся в черновик»'],
            ]} />
          <Callout n="02" title="Строка настройки"
            items={[
              ['DOT',      '3×3 red-квадрат слева у изменённых строк — без фона, без «пилюли»'],
              ['LABEL',    'mono 11 — название. Ниже ink-55 hint — единицы, смысл'],
              ['CONTROL',  'Справа: StepControl / SegControl / Toggle — все outline ink-80'],
              ['NO-FILL',  'Нет заливок фона строк. Разделители — hairline ink-35 между строками'],
            ]} />
          <Callout n="03" title="Контролы"
            items={[
              ['STEP',    '[− 10 +] — ink-80 рамка + slab-число по центру, tnum. Для чисел/дней/%'],
              ['SEG',     '1/мес · 2/мес · 1/нед — активный ink-filled, остальные outline. Для выбора из 2-3'],
              ['TOGGLE',  '28×14 outline-прямоугольник с ink-квадратом — двоичные значения'],
            ]} />
        </div>

        <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center' }}>
          <HiFiSettings />
          <PhoneCaption n="04" label="Настройки" sublabel="staged edit · 4 группы · попробуйте изменить" accent="var(--red)" />
        </div>

        <div style={{ paddingTop: 24, display: 'flex', flexDirection: 'column', gap: 28 }}>
          <Callout n="05" title="Группа «Цикл зарплаты»"
            items={[
              ['DAY',     'День зарплаты 1–28 · StepControl'],
              ['AMOUNT',  'Сумма — StepControl шагом 1 000 ₽'],
              ['FREQ',    'Частота — SegControl (1/мес · 2/мес · 1/нед)'],
            ]} />
          <Callout n="06" title="Группа «Подушка»"
            items={[
              ['SIZE',     'Размер в мес. расходов · StepControl 0–12, шаг 0.5'],
              ['SOURCE',   'Источник — SegControl: свободные / доплата'],
              ['PRIORITY', 'Приоритет — строгий / баланс / выкл'],
            ]} />
          <Callout n="07" title="Группа «Накопления»"
            items={[
              ['AUTO',    'Автоотчисления от зарплаты %'],
              ['ROUND',   'Округление расходов — Toggle'],
            ]} />
          <Callout n="08" title="Группа «Расчёт»"
            items={[
              ['MODE',       'Режим лимита — сглаж. / строго'],
              ['INFLATION',  'Инфляция % годовых — для «в сегодняшних ₽»'],
              ['WINDOW',     'Окно «учтён в лимите» — дней вперёд'],
              ['NOTE',       'Это самые тонкие ручки модели. Пояснения-hints под лейблами обязательны'],
            ]} />
          <Callout n="09" title="CTA — симметричная пара"
            items={[
              ['DISCARD',  '«Отменить» слева, outline · возврат к applied'],
              ['APPLY',    '«Применить» справа, ink/paper filled · единственное filled-действие'],
              ['DISABLED', 'Обе кнопки disabled если нет правок (ink-18, ink-35-текст)'],
              ['TAB',      'Активна 5-я — «Настр.» — halfcircle-глиф'],
            ]} />
        </div>
      </section>

      <footer style={{ marginTop: 64, paddingTop: 20, borderTop: '0.5px solid var(--ink-35)', display: 'flex', justifyContent: 'space-between', alignItems: 'baseline' }}>
        <span className="mono" style={{ fontSize: 9.5, color: 'var(--ink-55)', letterSpacing: '0.08em' }}>МФМ · Hi-fi · 05/05 · Настройки</span>
        <span className="mono" style={{ fontSize: 9.5, color: 'var(--ink-55)', letterSpacing: '0.08em' }}>DRAFT · 24.04.26</span>
      </footer>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
