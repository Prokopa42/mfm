<title>МФМ · Hi-fi · Главный</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Archivo+Black&display=swap" rel="stylesheet">

<style>
  :root{
    /* Ink scale — more levels than wireframes, for finer hierarchy */
    --ink:      #14120d;
    --ink-80:   #2a2720;
    --ink-55:   #6a6557;
    --ink-35:   #9a9483;
    --ink-18:   #c4bfac;
    --hair:     #d9d3bc;    /* hairlines on paper */
    --thin:     #e3ddc5;

    /* Paper — single warm background, no variants */
    --paper:    #f4f1e8;

    /* Accents — used as signals only */
    --red:      #c42a2a;
    --blue:     #0e4fb0;
    --yellow:   #eccc3a;    /* slightly richer than wireframe */
    --yellow-bg:#f5e489;    /* soft fill, used once */

    /* Line weights */
    --w-hair:   0.5px;
    --w-reg:    1px;
    --w-heavy:  1.5px;     /* hi-fi softer than wireframe's 2px */

    /* Type scale — tight, deliberate */
    --t-hero:   64px;       /* main number */
    --t-hero-x: 20px;       /* ruble */
    --t-num-m:  14px;       /* inline numbers */
    --t-num-s:  12px;
    --t-eyebrow:9px;        /* uppercase labels */
    --t-body:   11.5px;
    --t-micro:  9.5px;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{
    background:#e8e3d0;           /* page bg slightly darker than paper, so phone pops */
    color:var(--ink);
    font-family:'JetBrains Mono', ui-monospace, monospace;
    -webkit-font-smoothing:antialiased;
    font-feature-settings: "tnum" 1, "ss01" 1;
    font-variant-numeric: tabular-nums;
  }
  .slab{ font-family:'Archivo Black', system-ui; font-weight:900; letter-spacing:-0.02em; }
  .mono{ font-family:'JetBrains Mono', monospace; }
  .tnum{ font-variant-numeric: tabular-nums; }
  .eyebrow{
    font-family:'Archivo Black', system-ui;
    font-size: var(--t-eyebrow);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-55);
  }
  .eyebrow--ink{ color: var(--ink); }
  .micro{
    font-family:'JetBrains Mono', monospace;
    font-size: var(--t-micro);
    color: var(--ink-55);
    letter-spacing: 0.02em;
  }
  #root{ padding: 48px 32px 72px; max-width: 1440px; margin: 0 auto; }
</style>
</head>
