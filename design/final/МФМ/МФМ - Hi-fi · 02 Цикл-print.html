<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>МФМ · Hi-fi · Цикл</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Archivo+Black&display=swap" rel="stylesheet">

<style>
  :root{
    --ink:      #14120d;
    --ink-80:   #2a2720;
    --ink-55:   #6a6557;
    --ink-35:   #9a9483;
    --ink-18:   #c4bfac;
    --hair:     #d9d3bc;
    --thin:     #e3ddc5;
    --paper:    #f4f1e8;
    --red:      #c42a2a;
    --blue:     #0e4fb0;
    --yellow:   #eccc3a;

    --w-hair:   0.5px;
    --w-reg:    1px;
    --w-heavy:  1.5px;

    --t-hero:   64px;
    --t-hero-x: 20px;
    --t-num-m:  14px;
    --t-num-s:  12px;
    --t-eyebrow:9px;
    --t-body:   11.5px;
    --t-micro:  9.5px;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{
    background:#e8e3d0;
    color:var(--ink);
    font-family:'JetBrains Mono', ui-monospace, monospace;
    -webkit-font-smoothing:antialiased;
    font-feature-settings: "tnum" 1, "ss01" 1;
    font-variant-numeric: tabular-nums;
  }
  .slab{ font-family:'Archivo Black', system-ui; font-weight:900; letter-spacing:-0.02em; }
  .mono{ font-family:'JetBrains Mono', monospace; }
  .tnum{ font-variant-numeric: tabular-nums; }
  .eyebrow{
    font-family:'Archivo Black', system-ui;
    font-size: var(--t-eyebrow);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-55);
  }
  .eyebrow--ink{ color: var(--ink); }
  #root{ padding: 48px 32px 72px; max-width: 1440px; margin: 0 auto; }

  @page { size: 1480px 1100px; margin: 0; }
  @media print {
    html, body {
      background: #e8e3d0 !important;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    #root { padding: 40px 28px 48px; max-width: none; }
    * { break-inside: avoid; }
    header, footer, section { break-inside: avoid; }
  }
</style>
</head>

<template id="__bundler_thumbnail" data-bg-color="#f4f1e8">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <rect x="420" y="120" width="360" height="560" fill="#f4f1e8" stroke="#14120d" stroke-width="4"/>
    <line x1="468" y1="400" x2="732" y2="400" stroke="#14120d" stroke-width="2"/>
    <line x1="580" y1="380" x2="580" y2="420" stroke="#14120d" stroke-width="3"/>
    <line x1="630" y1="392" x2="630" y2="400" stroke="#c42a2a" stroke-width="2"/>
    <line x1="670" y1="392" x2="670" y2="400" stroke="#0e4fb0" stroke-width="2"/>
    <text x="600" y="600" font-family="'Archivo Black', sans-serif" font-size="22" text-anchor="middle" fill="#14120d">02 · ЦИКЛ</text>
  </svg>
</template>

<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="hifi-primitives.jsx"></script>
<script type="text/babel" src="hifi-cycle.jsx"></script>

<script type="text/babel">

function PageHead() {
  return (
    <header style={{ marginBottom: 40, display: 'grid', gridTemplateColumns: '1fr auto', alignItems: 'end', gap: 40, borderBottom: '1px solid var(--ink)', paddingBottom: 22 }}>
      <div>
        <div style={{ display: 'flex', alignItems: 'baseline', gap: 14, marginBottom: 8 }}>
          <span className="slab" style={{ fontSize: 11, letterSpacing: '0.2em', textTransform: 'uppercase' }}>МФМ</span>
          <div style={{ width: 28, height: 0.5, background: 'var(--ink-55)' }} />
          <span className="mono" style={{ fontSize: 10, color: 'var(--ink-55)', letterSpacing: '0.1em', textTransform: 'uppercase' }}>Hi-fi · 02 · Цикл</span>
        </div>
        <h1 className="slab" style={{ fontSize: 40, lineHeight: 1.02, letterSpacing: '-0.015em', maxWidth: 820 }}>
          Цикл зарплата → зарплата. Платежи на оси.
        </h1>
        <p className="mono" style={{ fontSize: 12, color: 'var(--ink-55)', marginTop: 14, maxWidth: 720, lineHeight: 1.55 }}>
          Ось дней, «сегодня», обязательные платежи — оплаченные, к оплате, учтённые в лимите. Hero — доступно до зарплаты и дневной лимит. Ближайший платёж выделен отдельным баннером; список сгруппирован по статусу.
        </p>
      </div>
      <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-end', gap: 10 }}>
        <div style={{ display: 'flex', gap: 4 }}>
          {['01', '02', '03', '04', '05'].map((n, i) => (
            <div key={i} style={{
              padding: '5px 9px',
              border: i === 1 ? '1px solid var(--ink)' : '0.5px solid var(--ink-35)',
              background: i === 1 ? 'var(--ink)' : 'transparent',
              color:      i === 1 ? 'var(--paper)' : 'var(--ink-55)',
            }}>
              <span className="slab" style={{ fontSize: 9, letterSpacing: '0.14em' }}>{n}</span>
            </div>
          ))}
        </div>
        <span className="mono" style={{ fontSize: 9.5, color: 'var(--ink-55)', letterSpacing: '0.08em' }}>СЕЙЧАС · ЦИКЛ · НАКОП. · ИСТОРИЯ · НАСТРОЙКИ</span>
      </div>
    </header>
  );
}

function Callout({ n, title, items }) {
  return (
    <div style={{ maxWidth: 340 }}>
      <div style={{ display: 'flex', alignItems: 'baseline', gap: 8, marginBottom: 8 }}>
        <span className="slab" style={{ fontSize: 11, letterSpacing: '0.14em' }}>{n}</span>
        <div style={{ flex: 1, height: 0.5, background: 'var(--ink)' }} />
      </div>
      <div className="slab" style={{ fontSize: 16, lineHeight: 1.25, marginBottom: 14, letterSpacing: '-0.01em' }}>{title}</div>
      <div style={{ display: 'grid', gridTemplateColumns: 'auto 1fr', columnGap: 12, rowGap: 8 }}>
        {items.map(([k, v], i) => (
          <React.Fragment key={i}>
            <span className="eyebrow" style={{ paddingTop: 2, fontSize: 8.5 }}>{k}</span>
            <span className="mono" style={{ fontSize: 10.5, lineHeight: 1.5, color: 'var(--ink-80)' }}>{v}</span>
          </React.Fragment>
        ))}
      </div>
    </div>
  );
}

function PhoneCaption({ n, label, sublabel, accent }) {
  return (
    <div style={{ textAlign: 'center', marginTop: 20, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6 }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
        <span className="slab" style={{ fontSize: 10, letterSpacing: '0.18em' }}>{n}</span>
        <div style={{ width: 12, height: 1, background: 'var(--ink)' }} />
        <span className="slab" style={{ fontSize: 14, letterSpacing: '0.1em', textTransform: 'uppercase' }}>{label}</span>
        {accent && <div style={{ width: 8, height: 8, background: accent }} />}
      </div>
      <span className="mono" style={{ fontSize: 10, color: 'var(--ink-55)', letterSpacing: '0.02em' }}>{sublabel}</span>
    </div>
  );
}

function App() {
  return (
    <>
      <PageHead />

      <section style={{ display: 'grid', gridTemplateColumns: 'minmax(280px, 340px) auto minmax(280px, 340px)', gap: 56, alignItems: 'start', justifyContent: 'center' }}>
        <div style={{ paddingTop: 24, display: 'flex', flexDirection: 'column', gap: 28 }}>
          <Callout n="01" title="Hero — доступно до зарплаты"
            items={[
              ['HERO',   '43 100 ₽ — Archivo Black 64. 3 px ink-полоса слева (не blue: это не копилка)'],
              ['DAYS',   '· 16 дн. рядом с hero — сразу даёт горизонт'],
              ['LIMIT',  '«дневной лимит N ₽/день» — вторичная строка под ink-линией'],
              ['RULE',   'Hero = не «сколько всего», а «сколько безопасно тратить в этом цикле»'],
            ]} />
          <Callout n="02" title="Ось дней"
            items={[
              ['SCALE',   '30 делений · недельные засечки длиннее (7/14/21)'],
              ['SALARY',  'Blue круг в начале (получена) и blue outline-круг в конце (ожидается)'],
              ['TODAY',   '1.5 px ink вертикаль над и под осью + точка + метка «СЕГ · 24 АПР»'],
              ['PAST',    'Прошедшая часть — ink-35 hairline под осью'],
              ['LEGEND',  'Три маркера внизу: bar/tri/dot — «оплачен / к оплате / учтён»'],
            ]} />
          <Callout n="03" title="Маркеры платежей"
            items={[
              ['PAID',    'Горизонтальная планка ink-55 сверху — «закрыт, не тревожит»'],
              ['DUE',     'Красный треугольник + 1.5 px вертикаль — «завтра, обрати внимание»'],
              ['COUNTED', 'Blue outline-круг — «учтён в лимите, деньги зарезервированы»'],
              ['RULE',    'Форма несёт смысл: статика / срочность / план'],
            ]} />
        </div>

        <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center' }}>
          <HiFiCycle />
          <PhoneCaption n="04" label="Цикл" sublabel="10 апр → 10 май · день 15 из 30" accent="var(--ink)" />
        </div>

        <div style={{ paddingTop: 24, display: 'flex', flexDirection: 'column', gap: 28 }}>
          <Callout n="05" title="Ближайший платёж"
            items={[
              ['BANNER',  '3 px red-полоса · «Ближайший платёж · завтра» — выделенный из потока'],
              ['AMOUNT',  'Сумма справа, red, slab 15 — глаз сразу на цифре'],
              ['WHY',     'Отдельный баннер, а не строка в списке — критическое событие выносится'],
            ]} />
          <Callout n="06" title="Триада итогов цикла"
            items={[
              ['PAID',      'оплачено · ink-55 — уже не ваша проблема'],
              ['REMAINING', 'осталось платежей · red — «не трогать»'],
              ['FREE',      'свободные · blue — «на жизнь и в накопления»'],
              ['RULE',      '3 числа одной высоты — прямое визуальное уравнение'],
            ]} />
          <Callout n="07" title="Список платежей"
            items={[
              ['GROUPED', '3 группы по статусу: К оплате → Учтены → Оплачены'],
              ['ROW',     '2 px цветной маркер · дата mono · название slab · сумма slab'],
              ['PAID',    'Оплаченные — opacity 0.6 + strikethrough названия'],
              ['DUE',     'Сумма «к оплате» — red'],
            ]} />
          <Callout n="08" title="CTA и таб"
            items={[
              ['PRIMARY',   '«Отметить оплату» ink/paper — самое частое действие'],
              ['SECONDARY', '«Новый платёж» outline — добавить обязательство'],
              ['TAB',       'Активна 2-я — «Цикл» — bar-глиф ink'],
            ]} />
        </div>
      </section>

      <footer style={{ marginTop: 64, paddingTop: 20, borderTop: '0.5px solid var(--ink-35)', display: 'flex', justifyContent: 'space-between', alignItems: 'baseline' }}>
        <span className="mono" style={{ fontSize: 9.5, color: 'var(--ink-55)', letterSpacing: '0.08em' }}>МФМ · Hi-fi · 02/05 · Цикл</span>
        <span className="mono" style={{ fontSize: 9.5, color: 'var(--ink-55)', letterSpacing: '0.08em' }}>DRAFT · 24.04.26</span>
      </footer>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

(async () => {
  try { await document.fonts.ready; } catch (e) {}
  await new Promise(r => setTimeout(r, 800));
  window.print();
})();
</script>

</body>
</html>
