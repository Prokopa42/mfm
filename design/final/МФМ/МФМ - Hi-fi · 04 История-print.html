<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>МФМ · Hi-fi · История</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Archivo+Black&display=swap" rel="stylesheet">

<style>
  :root{
    --ink:#14120d; --ink-80:#2a2720; --ink-55:#6a6557; --ink-35:#9a9483; --ink-18:#c4bfac;
    --hair:#d9d3bc; --thin:#e3ddc5; --paper:#f4f1e8;
    --red:#c42a2a; --blue:#0e4fb0; --yellow:#eccc3a;
    --w-hair:0.5px; --w-reg:1px; --w-heavy:1.5px;
    --t-hero:64px; --t-hero-x:20px; --t-num-m:14px; --t-num-s:12px;
    --t-eyebrow:9px; --t-body:11.5px; --t-micro:9.5px;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{
    background:#e8e3d0; color:var(--ink);
    font-family:'JetBrains Mono', ui-monospace, monospace;
    -webkit-font-smoothing:antialiased;
    font-feature-settings: "tnum" 1; font-variant-numeric: tabular-nums;
  }
  .slab{ font-family:'Archivo Black', system-ui; font-weight:900; letter-spacing:-0.02em; }
  .mono{ font-family:'JetBrains Mono', monospace; }
  .tnum{ font-variant-numeric: tabular-nums; }
  .eyebrow{
    font-family:'Archivo Black', system-ui;
    font-size: var(--t-eyebrow); letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--ink-55);
  }
  .eyebrow--ink{ color: var(--ink); }
  #root{ padding: 48px 32px 72px; max-width: 1440px; margin: 0 auto; }

  @page { size: 1480px 1100px; margin: 0; }
  @media print {
    html, body {
      background: #e8e3d0 !important;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    #root { padding: 40px 28px 48px; max-width: none; }
    * { break-inside: avoid; }
    header, footer, section { break-inside: avoid; }
  }
</style>
</head>

<template id="__bundler_thumbnail" data-bg-color="#f4f1e8">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <rect x="420" y="120" width="360" height="560" fill="#f4f1e8" stroke="#14120d" stroke-width="4"/>
    <line x1="460" y1="280" x2="740" y2="280" stroke="#14120d" stroke-width="1"/>
    <line x1="460" y1="330" x2="740" y2="330" stroke="#d9d3bc" stroke-width="0.5"/>
    <line x1="460" y1="380" x2="740" y2="380" stroke="#d9d3bc" stroke-width="0.5"/>
    <line x1="460" y1="430" x2="740" y2="430" stroke="#d9d3bc" stroke-width="0.5"/>
    <text x="600" y="600" font-family="'Archivo Black', sans-serif" font-size="22" text-anchor="middle" fill="#14120d">04 · ИСТОРИЯ</text>
  </svg>
</template>

<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="hifi-primitives.jsx"></script>
<script type="text/babel" src="hifi-history.jsx"></script>

<script type="text/babel">

function PageHead() {
  return (
    <header style={{ marginBottom: 40, display: 'grid', gridTemplateColumns: '1fr auto', alignItems: 'end', gap: 40, borderBottom: '1px solid var(--ink)', paddingBottom: 22 }}>
      <div>
        <div style={{ display: 'flex', alignItems: 'baseline', gap: 14, marginBottom: 8 }}>
          <span className="slab" style={{ fontSize: 11, letterSpacing: '0.2em', textTransform: 'uppercase' }}>МФМ</span>
          <div style={{ width: 28, height: 0.5, background: 'var(--ink-55)' }} />
          <span className="mono" style={{ fontSize: 10, color: 'var(--ink-55)', letterSpacing: '0.1em', textTransform: 'uppercase' }}>Hi-fi · 04 · История</span>
        </div>
        <h1 className="slab" style={{ fontSize: 40, lineHeight: 1.02, letterSpacing: '-0.015em', maxWidth: 820 }}>
          История. Вторичный экран. Без шума.
        </h1>
        <p className="mono" style={{ fontSize: 12, color: 'var(--ink-55)', marginTop: 14, maxWidth: 720, lineHeight: 1.55 }}>
          Справочный экран, не принятия решений. Фильтр по типам, ровные числовые колонки, тонкие разделители, строгие форма-глифы вместо цвета. Цвет появляется только на переводах (blue) — единственный тип, который «двигает деньги внутри».
        </p>
      </div>
      <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-end', gap: 10 }}>
        <div style={{ display: 'flex', gap: 4 }}>
          {['01', '02', '03', '04', '05'].map((n, i) => (
            <div key={i} style={{
              padding: '5px 9px',
              border: i === 3 ? '1px solid var(--ink)' : '0.5px solid var(--ink-35)',
              background: i === 3 ? 'var(--ink)' : 'transparent',
              color:      i === 3 ? 'var(--paper)' : 'var(--ink-55)',
            }}>
              <span className="slab" style={{ fontSize: 9, letterSpacing: '0.14em' }}>{n}</span>
            </div>
          ))}
        </div>
        <span className="mono" style={{ fontSize: 9.5, color: 'var(--ink-55)', letterSpacing: '0.08em' }}>СЕЙЧАС · ЦИКЛ · НАКОП. · ИСТОРИЯ · НАСТРОЙКИ</span>
      </div>
    </header>
  );
}

function Callout({ n, title, items }) {
  return (
    <div style={{ maxWidth: 340 }}>
      <div style={{ display: 'flex', alignItems: 'baseline', gap: 8, marginBottom: 8 }}>
        <span className="slab" style={{ fontSize: 11, letterSpacing: '0.14em' }}>{n}</span>
        <div style={{ flex: 1, height: 0.5, background: 'var(--ink)' }} />
      </div>
      <div className="slab" style={{ fontSize: 16, lineHeight: 1.25, marginBottom: 14, letterSpacing: '-0.01em' }}>{title}</div>
      <div style={{ display: 'grid', gridTemplateColumns: 'auto 1fr', columnGap: 12, rowGap: 8 }}>
        {items.map(([k, v], i) => (
          <React.Fragment key={i}>
            <span className="eyebrow" style={{ paddingTop: 2, fontSize: 8.5 }}>{k}</span>
            <span className="mono" style={{ fontSize: 10.5, lineHeight: 1.5, color: 'var(--ink-80)' }}>{v}</span>
          </React.Fragment>
        ))}
      </div>
    </div>
  );
}

function PhoneCaption({ n, label, sublabel }) {
  return (
    <div style={{ textAlign: 'center', marginTop: 20, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6 }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
        <span className="slab" style={{ fontSize: 10, letterSpacing: '0.18em' }}>{n}</span>
        <div style={{ width: 12, height: 1, background: 'var(--ink)' }} />
        <span className="slab" style={{ fontSize: 14, letterSpacing: '0.1em', textTransform: 'uppercase' }}>{label}</span>
      </div>
      <span className="mono" style={{ fontSize: 10, color: 'var(--ink-55)', letterSpacing: '0.02em' }}>{sublabel}</span>
    </div>
  );
}

function App() {
  return (
    <>
      <PageHead />

      <section style={{ display: 'grid', gridTemplateColumns: 'minmax(280px, 340px) auto minmax(280px, 340px)', gap: 56, alignItems: 'start', justifyContent: 'center' }}>
        <div style={{ paddingTop: 24, display: 'flex', flexDirection: 'column', gap: 28 }}>
          <Callout n="01" title="Тихая шапка"
            items={[
              ['TITLE',   '«История» + число операций за период — никаких hero-чисел'],
              ['SEARCH',  'Иконка-кружок + подпись «поиск» справа — стандартный жест'],
              ['RULE',    'Без зарплаты, без баланса, без тревожных сигналов — экран не принимает решений'],
            ]} />
          <Callout n="02" title="Фильтр-чипы"
            items={[
              ['CHIPS',   'Все · Доход · Расход · Перевод · Снятие'],
              ['GLYPH',   'Форма-глиф слева: плюс / минус / стрелка / квадрат — читается до текста'],
              ['COUNT',   'Число справа в каждом чипе — сколько операций в этом типе'],
              ['ACTIVE',  'Активный — ink/paper filled; остальные — outline ink-35'],
            ]} />
          <Callout n="03" title="Триада сумм"
            items={[
              ['CELLS',   'Доход · Расход · Перевод — 3 равные ячейки, разделитель hairline'],
              ['SIGN',    '+/− на числе, единый slab-вес, без цвета кроме перевода (blue)'],
              ['CONTEXT', 'Реагирует на фильтр: при «Перевод» остаётся одна колонка с суммой'],
            ]} />
        </div>

        <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center' }}>
          <HiFiHistory />
          <PhoneCaption n="04" label="История" sublabel="13 операций · апр · фильтр интерактивен" />
        </div>

        <div style={{ paddingTop: 24, display: 'flex', flexDirection: 'column', gap: 28 }}>
          <Callout n="05" title="Группировка по дням"
            items={[
              ['HEADER',  'Дата + день недели, slab 9.5, UPPERCASE — как заголовок таблицы'],
              ['COUNT',   'Число операций за день справа, mono, ink-55'],
              ['DIVIDER', 'Under — 0.5 px ink-80 (не hairline) — крепкий разрыв между днями'],
            ]} />
          <Callout n="06" title="Строка операции"
            items={[
              ['COL-A',   'Форма-глиф 10×10: плюс/минус/стрелка/квадрат'],
              ['COL-B',   'Время 14:20 — mono, ink-55, tnum'],
              ['COL-C',   'Название — mono 11, ellipsis при переполнении'],
              ['COL-D',   'Сумма slab 12 + баланс после операции mono ink-35'],
              ['RULE',    'Всё ink. Цвет только у blue-переводов. Никаких заливок'],
            ]} />
          <Callout n="07" title="Числовые колонки"
            items={[
              ['TNUM',     'Все цифры — tabular-nums, поэтому столбец не «скачет»'],
              ['ALIGN',    'Сумма и баланс right-aligned, одна ось'],
              ['CURRENCY', '₽ вынесен mono 8.5 ink-55 — не мешает глазу'],
            ]} />
          <Callout n="08" title="Что намеренно отсутствует"
            items={[
              ['NO-HERO',    'Нет hero-числа'],
              ['NO-CTA',     'Нет CTA — экран справочный'],
              ['NO-COLOR',   'Нет цветного фона строк · нет статусов · нет превью-графиков'],
              ['NO-PHOTO',   'Нет иконок магазинов или логотипов'],
              ['RULE',       'Тишина — важная часть дизайна. Это фон, не сцена'],
            ]} />
        </div>
      </section>

      <footer style={{ marginTop: 64, paddingTop: 20, borderTop: '0.5px solid var(--ink-35)', display: 'flex', justifyContent: 'space-between', alignItems: 'baseline' }}>
        <span className="mono" style={{ fontSize: 9.5, color: 'var(--ink-55)', letterSpacing: '0.08em' }}>МФМ · Hi-fi · 04/05 · История</span>
        <span className="mono" style={{ fontSize: 9.5, color: 'var(--ink-55)', letterSpacing: '0.08em' }}>DRAFT · 24.04.26</span>
      </footer>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

(async () => {
  try { await document.fonts.ready; } catch (e) {}
  await new Promise(r => setTimeout(r, 800));
  window.print();
})();
</script>

</body>
</html>
